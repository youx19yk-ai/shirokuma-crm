services:
  - type: web
    name: shirokuma-crm
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shirokuma-db
          property: connectionString

databases:
  - name: shirokuma-db
    plan: free
